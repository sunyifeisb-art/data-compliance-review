[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "cd data-compliance-web && python3 -m venv venv && source venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = "cd data-compliance-web && source venv/bin/activate && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
