<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据合规智能审查系统</title>
    <style>
        :root {
            --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --font-reading: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --font-mono: "SF Mono", Menlo, Monaco, Consolas, monospace;
            --page: #f4f1ea;
            --panel: #fffdf8;
            --panel-strong: #f9f4e8;
            --ink: #161a1d;
            --muted: #66706d;
            --faint: #8c9692;
            --line: #d9d1c3;
            --teal: #006d6a;
            --teal-soft: #d7eeeb;
            --amber: #b86816;
            --amber-soft: #f6e2c8;
            --red: #b42318;
            --shadow: 0 22px 60px rgba(39, 33, 24, 0.12);
            --soft-shadow: 0 10px 28px rgba(39, 33, 24, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            color: var(--ink);
            background:
                linear-gradient(90deg, rgba(22,26,29,0.035) 1px, transparent 1px) 0 0 / 64px 64px,
                linear-gradient(180deg, rgba(22,26,29,0.035) 1px, transparent 1px) 0 0 / 64px 64px,
                var(--page);
            font-family: var(--font-ui);
            line-height: 1.65;
            font-size: 16px;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(244, 241, 234, 0.88);
            border-bottom: 1px solid rgba(217, 209, 195, 0.8);
            backdrop-filter: blur(18px);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 760;
            letter-spacing: 0;
        }
        .logo span { color: var(--teal); }
        .header-status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 0 5px rgba(0,109,106,0.14);
        }
        .shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 34px 32px 56px;
        }
        .main {
            display: grid;
            grid-template-columns: minmax(330px, 0.92fr) minmax(560px, 1.28fr);
            gap: 28px;
            align-items: stretch;
        }
        .hero-panel,
        .workbench,
        .history-panel,
        .feature-item,
        .upload-card {
            border: 1px solid var(--line);
            background: rgba(255,253,248,0.92);
            box-shadow: var(--soft-shadow);
        }
        .hero-panel {
            min-height: 650px;
            padding: 34px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .hero-panel::after {
            content: "";
            position: absolute;
            right: -120px;
            bottom: -140px;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,109,106,0.18), transparent 68%);
            pointer-events: none;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            padding: 8px 10px;
            border: 1px solid var(--line);
            background: var(--panel-strong);
            color: var(--teal);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .hero-content h1 {
            font-family: var(--font-display);
            margin-top: 34px;
            font-size: clamp(40px, 5vw, 72px);
            line-height: 0.98;
            font-weight: 720;
            letter-spacing: 0;
        }
        .hero-content p {
            margin-top: 24px;
            max-width: 520px;
            color: var(--muted);
            font-size: 17px;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border: 1px solid var(--line);
            background: rgba(249,244,232,0.78);
            position: relative;
            z-index: 1;
        }
        .metric {
            padding: 18px 14px;
            border-right: 1px solid var(--line);
        }
        .metric:last-child { border-right: 0; }
        .metric strong {
            display: block;
            font-size: 24px;
            line-height: 1;
            color: var(--ink);
        }
        .metric span {
            display: block;
            margin-top: 7px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }
        .workbench {
            padding: 18px;
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 18px;
        }
        .product-switch {
            display: grid;
            align-content: start;
            gap: 12px;
        }
        .product-card {
            min-height: 148px;
            padding: 18px;
            border: 1px solid var(--line);
            background: var(--panel-strong);
            color: var(--ink);
            text-align: left;
            cursor: pointer;
            transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
        }
        .product-card:hover { transform: translateY(-1px); border-color: var(--teal); }
        .product-card.active {
            background: var(--ink);
            border-color: var(--ink);
            color: #fffdf8;
        }
        .product-kicker {
            color: var(--amber);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .product-card.active .product-kicker { color: #f4c06e; }
        .product-title {
            margin-top: 18px;
            font-size: 18px;
            font-weight: 800;
        }
        .product-copy {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
        }
        .product-card.active .product-copy { color: rgba(255,253,248,0.72); }
        .upload-card {
            padding: 22px;
            box-shadow: none;
        }
        .field-label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .field-input,
        .text-input-area {
            width: 100%;
            border: 1px solid var(--line);
            background: #fffaf1;
            color: var(--ink);
            font-family: var(--font-ui);
            outline: none;
            transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
        }
        .field-input {
            height: 46px;
            padding: 0 14px;
            margin-bottom: 16px;
        }
        .field-input:focus,
        .text-input-area:focus {
            border-color: var(--teal);
            background: #fffdf8;
            box-shadow: 0 0 0 4px rgba(0,109,106,0.1);
        }
        .field-input::placeholder,
        .text-input-area::placeholder { color: var(--faint); }
        .review-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            padding: 4px;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            background: var(--panel-strong);
        }
        .mode-btn {
            border: 0;
            min-height: 40px;
            background: transparent;
            color: var(--muted);
            font: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }
        .mode-btn.active {
            background: var(--teal);
            color: #fffdf8;
        }
        .upload-zone {
            min-height: 210px;
            padding: 26px;
            display: grid;
            place-items: center;
            text-align: center;
            border: 1.5px dashed #b9ad9a;
            background:
                linear-gradient(135deg, rgba(0,109,106,0.08), transparent 40%),
                #fffaf1;
            cursor: pointer;
            transition: border-color 180ms ease, background 180ms ease;
        }
        .upload-zone:hover,
        .upload-zone.drag-active {
            border-color: var(--teal);
            background: var(--teal-soft);
        }
        .upload-icon {
            width: 54px;
            height: 54px;
            margin: 0 auto 16px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--teal);
            font-size: 13px;
            font-weight: 800;
        }
        .upload-icon::before { content: "FILE"; }
        .upload-zone h3 {
            margin-bottom: 6px;
            font-size: 20px;
            font-weight: 800;
        }
        .upload-zone p {
            color: var(--muted);
            font-size: 13px;
        }
        .format-detail {
            display: none;
            max-width: 470px;
            margin: 12px auto 0;
            color: var(--muted);
            font-size: 13px;
        }
        .format-detail.show { display: block; }
        .format-group { display: block; }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 22px;
            border: 1px solid var(--ink);
            background: var(--ink);
            color: #fffdf8;
            font: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }
        .upload-zone .btn-primary { margin-top: 18px; }
        .btn-primary:hover {
            transform: translateY(-1px);
            background: var(--teal);
            border-color: var(--teal);
        }
        .btn-primary:disabled {
            opacity: 0.58;
            cursor: not-allowed;
            transform: none;
        }
        .file-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding: 14px;
            border: 1px solid var(--line);
            background: var(--panel-strong);
        }
        .file-card-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .file-icon {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--amber);
            font-size: 11px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .file-icon::before { content: "DOC"; }
        .file-name {
            color: var(--ink);
            font-size: 14px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size {
            margin-top: 2px;
            color: var(--faint);
            font-size: 12px;
        }
        .file-remove {
            width: 34px;
            height: 34px;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--muted);
            cursor: pointer;
            font-size: 17px;
        }
        .file-remove:hover { color: var(--red); border-color: var(--red); }
        .or-divider {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: center;
            margin: 16px 0;
            color: var(--faint);
            font-size: 12px;
            font-weight: 800;
        }
        .or-divider::before,
        .or-divider::after {
            content: "";
            height: 1px;
            background: var(--line);
        }
        .text-input-area {
            min-height: 116px;
            padding: 14px;
            resize: vertical;
            font-family: var(--font-reading);
            font-size: 16px;
            line-height: 1.75;
        }
        .history-panel {
            margin-top: 18px;
            padding: 18px;
        }
        .history-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }
        .history-title {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .history-refresh {
            border: 1px solid var(--line);
            background: var(--panel-strong);
            color: var(--muted);
            padding: 7px 10px;
            font: inherit;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .history-list {
            display: grid;
            gap: 8px;
            max-height: 196px;
            overflow: auto;
        }
        .history-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--line);
            background: #fffaf1;
            color: inherit;
            text-decoration: none;
        }
        .history-name {
            color: var(--ink);
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-meta,
        .history-empty {
            color: var(--faint);
            font-size: 12px;
        }
        .history-status {
            color: var(--teal);
            font-size: 12px;
            font-weight: 800;
        }
        .features-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-top: 24px;
        }
        .feature-item {
            padding: 20px;
            display: grid;
            grid-template-columns: 46px 1fr;
            gap: 14px;
            align-items: start;
        }
        .feature-icon {
            width: 46px;
            height: 46px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            background: var(--panel-strong);
            color: var(--teal);
            font-size: 12px;
            font-weight: 800;
        }
        .feature-text h4 {
            margin-bottom: 5px;
            font-size: 15px;
            font-weight: 800;
        }
        .feature-text p {
            color: var(--muted);
            font-size: 13px;
        }
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(22, 26, 29, 0.62);
            backdrop-filter: blur(6px);
        }
        .modal-backdrop.show { display: flex; }
        .modal-box {
            width: 100%;
            max-width: 440px;
            padding: 30px;
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: var(--shadow);
        }
        .modal-label {
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .modal-title {
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 800;
        }
        .modal-message {
            min-height: 20px;
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 14px;
        }
        .progress-track {
            width: 100%;
            height: 8px;
            overflow: hidden;
            background: var(--panel-strong);
            border: 1px solid var(--line);
        }
        .progress-fill {
            height: 100%;
            background: var(--teal);
            transition: width 0.15s linear;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: var(--faint);
            font-size: 12px;
            font-weight: 800;
        }
        .checkpoint-list {
            max-height: 160px;
            margin-top: 18px;
            padding-top: 14px;
            overflow-y: auto;
            border-top: 1px solid var(--line);
        }
        .checkpoint-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            color: var(--muted);
            font-size: 13px;
        }
        .checkpoint-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--line);
            flex-shrink: 0;
        }
        .checkpoint-dot.done { background: var(--teal); }
        .modal-box.error { border-top: 5px solid var(--red); }
        .error-icon {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            margin-bottom: 16px;
            background: #fbe8e6;
            color: var(--red);
            font-weight: 800;
        }
        .error-icon::before { content: "!"; }
        .btn-close {
            width: 100%;
            min-height: 42px;
            margin-top: 24px;
            border: 1px solid var(--line);
            background: var(--panel-strong);
            color: var(--ink);
            font: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }
        @media (max-width: 980px) {
            .header-inner,
            .shell { padding-left: 20px; padding-right: 20px; }
            .main,
            .workbench { grid-template-columns: 1fr; }
            .hero-panel { min-height: auto; gap: 48px; }
            .product-switch { grid-template-columns: 1fr 1fr; }
            .features-bar { grid-template-columns: 1fr; }
        }
        @media (max-width: 620px) {
            .header-status { display: none; }
            .shell { padding-top: 20px; }
            .hero-panel,
            .upload-card,
            .workbench { padding: 16px; }
            .hero-content h1 { font-size: 40px; }
            .metric-grid,
            .product-switch { grid-template-columns: 1fr; }
            .metric { border-right: 0; border-bottom: 1px solid var(--line); }
            .metric:last-child { border-bottom: 0; }
        }
        body.dark {
            --page: #18181a;
            --panel: #242426;
            --panel-strong: #2a2a2d;
            --ink: #e4e4e7;
            --muted: #a1a1aa;
            --faint: #71717a;
            --line: #3f3f46;
            --teal: #5eead4;
            --teal-soft: #1a3d3a;
            --amber: #fbbf24;
            --amber-soft: #3d2e0a;
            --red: #f87171;
            --shadow: 0 22px 60px rgba(0,0,0,0.4);
            --soft-shadow: 0 10px 28px rgba(0,0,0,0.3);
        }
        body.dark .header-inner,
        body.dark .hero-panel,
        body.dark .workbench,
        body.dark .upload-card,
        body.dark .history-panel,
        body.dark .feature-item,
        body.dark .product-card {
            background: var(--panel);
        }
        body.dark .eyebrow,
        body.dark .metric-grid,
        body.dark .metric,
        body.dark .file-card,
        body.dark .file-icon,
        body.dark .history-item,
        body.dark .file-remove,
        body.dark .upload-icon {
            background: var(--panel-strong);
        }
        body.dark .upload-zone {
            background: linear-gradient(135deg, rgba(94,234,212,0.08), transparent 40%), var(--panel);
            border-color: var(--line);
        }
        body.dark .review-toggle,
        body.dark .field-input,
        body.dark .text-input-area {
            background: var(--panel-strong);
            color: var(--ink);
        }
        body.dark .field-input:focus,
        body.dark .text-input-area:focus {
            background: var(--panel);
        }
        body.dark .mode-btn.active {
            background: var(--teal);
            color: var(--ink);
        }
        body.dark .product-card.active {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--page);
        }
        body.raven-layout {
            background: #f5f5f3;
            color: #111;
        }
        body.raven-layout header {
            position: fixed;
            inset: 0 auto 0 0;
            width: 264px;
            height: 100vh;
            overflow: auto;
            background: #f7f7f5;
            border-right: 1px solid #d4d4d0;
            border-bottom: 0;
            backdrop-filter: none;
        }
        body.raven-layout .header-inner {
            height: auto;
            min-height: 100%;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }
        .brand-block {
            padding: 0 6px 8px;
        }
        body.raven-layout .logo {
            font-size: 26px;
            font-weight: 760;
            letter-spacing: 0;
        }
        body.raven-layout .logo span { color: #111; }
        .brand-subtitle {
            margin-top: 4px;
            padding: 0 8px;
            color: #787878;
            font-size: 12px;
            line-height: 1.4;
            text-align: center;
            max-width: 190px;
        }
        .new-task {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            margin: 0 0 28px;
            border: 0;
            border-radius: 7px;
            background: #111;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 650;
        }
        .side-section {
            margin: 12px 0 0;
        }
        .side-label {
            margin: 0 6px 8px;
            color: #777;
            font-size: 13px;
        }
        .side-nav {
            display: grid;
            gap: 3px;
        }
        .side-nav a,
        .side-nav button {
            min-height: 36px;
            padding: 0 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 0;
            border-radius: 7px;
            background: transparent;
            color: #333;
            font: inherit;
            font-size: 15px;
            font-weight: 450;
            text-align: left;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .side-nav a:hover,
        .side-nav button:hover {
            background: rgba(0,0,0,0.04);
        }
        .side-nav a.active,
        .side-nav button.active {
            background: #111;
            color: #fff;
        }
        body.dark .side-nav button:hover {
            background: rgba(255,255,255,0.06);
        }
        .home-return {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            margin-top: 16px;
            padding: 10px 10px;
            border: 0;
            border-radius: 7px;
            background: #111;
            color: #fff;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .home-return:hover {
            background: #333;
        }
        body.dark .home-return {
            background: #e4e4e7;

            <button class="theme-float" id="themeFloat" type="button" aria-label="切换主题">
                <span class="theme-icon-light">☀</span>
                <span class="theme-icon-dark">☾</span>
            </button>
            <nav class="side-section side-nav" aria-label="主导航">
                <p class="side-label">工作区</p>
                <button type="button" data-workspace="desensitize">脱敏</button>
                <button class="active" type="button" data-workspace="review">审查</button>
            </nav>
            <section class="side-history" aria-label="审查记录">
                <div class="side-history-head">
                    <p class="history-title">最近任务</p>
                    <button class="history-toggle" id="toggleHistory" type="button">隐藏</button>
                </div>
                <div class="history-search">
                    <svg class="history-search-icon" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" class="history-search-input" id="historySearch" placeholder="搜索历史记录..." autocomplete="off">
                </div>
                <div class="history-list" id="historyList">
                    <p class="history-empty">正在读取记录...</p>
                </div>
            </section>
            <button type="button" class="home-return" data-workspace="home">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                返回首页
            </button>
        </div>
    </header>

    <div class="shell">
        <main class="main">
            <section class="home-board show" id="homeBoard" aria-label="主界面">
                <div class="home-stage">
                    <div class="home-stage-grid">
                        <div class="home-copy">
                            <p class="home-kicker">Compliance Desk</p>
                            <h1 class="home-headline">让合规审查和呼吸一样简单。</h1>
                            <p class="home-english">Compliance review and masking, made immediate.</p>
                            <div class="home-quick" aria-label="快速开始">
                                <button class="secondary" type="button" data-home-action="desensitize">数据脱敏</button>
                                <button type="button" data-home-action="review">合规审查</button>
                            </div>
                        </div>
                        <div class="home-visual" aria-hidden="true">
                            <div class="home-visual-meta">
                                <span>review</span>
                                <span>masking</span>
                            </div>
                            <div class="home-visual-card">
                                <div class="card-line full"></div>
                                <div class="card-line mid"></div>
                                <div class="card-line short"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <div class="workbench" id="workbenchPanel" style="display:none">
                    <div class="upload-card">
                        <label class="field-label" id="nameLabel">文档名称</label>
                        <input type="text" id="documentName" class="field-input" placeholder="例：某 App 隐私政策 V2.1">
                        <div class="review-toggle" id="reviewToggle" role="tablist" aria-label="审查模式">
                            <button class="mode-btn active" type="button" role="tab" aria-selected="true" data-review-type="document">文档审查</button>
                            <button class="mode-btn" type="button" role="tab" aria-selected="false" data-review-type="code">代码审查</button>
                        </div>

                        <div id="dropZone" class="upload-zone">
                            <div>
                                <div class="upload-icon" aria-hidden="true"></div>
                                <h3 id="uploadTitle" class="mode-copy">上传文件开始审查</h3>
                                <p id="supportText" class="mode-copy">支持 PDF、Word、TXT、扫描 PDF、图片</p>
                                <p id="formatDetail" class="format-detail"></p>
                                <button class="btn-primary" id="selectFileBtn">选择文件</button>
                            </div>
                            <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.markdown,.log,.rtf,.html,.htm,.xml,.yaml,.yml,.toml,.ini,.cfg,.conf,.env,.doc,.docx,.pdf,.pptx,.csv,.tsv,.xlsx,.xls,.ods,.json,.jsonl,.ndjson,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,.py,.js,.jsx,.ts,.tsx,.java,.go,.php,.rb,.swift,.kt,.c,.cc,.cpp,.h,.hpp,.cs,.rs,.sh,.sql,.css">
                        </div>

                        <div id="selectedFile" style="display:none">
                            <div class="file-card">
                                <div class="file-card-left">
                                    <div class="file-icon" aria-hidden="true"></div>
                                    <div>
                                        <p id="fileName" class="file-name"></p>
                                        <p id="fileSize" class="file-size"></p>
                                    </div>
                                </div>
                                <button id="removeFile" class="file-remove">x</button>
                            </div>
                        </div>

                        <div class="or-divider">或</div>
                        <textarea id="textInput" class="text-input-area" rows="4" placeholder="直接粘贴隐私政策或数据处理协议全文..."></textarea>
                        <button id="startBtn" class="btn-primary" style="width:100%; margin-top:16px;">开始审查</button>
                    </div>
            </div>
        </main>
    </div>

    <div id="progressModal" class="modal-backdrop">
        <div class="modal-box">
            <p class="modal-label">正在处理</p>
            <h3 class="modal-title">审查进行中...</h3>
            <p id="progressMessage" class="modal-message">准备开始</p>
            <div class="progress-track">
                <div id="progressBar" class="progress-fill" style="width:0%"></div>
            </div>
            <div class="progress-meta">
                <span>进度</span>
                <span id="progressPercent">0%</span>
            </div>
            <div id="checkpoints" class="checkpoint-list"></div>
        </div>
    </div>

    <div id="errorModal" class="modal-backdrop">
        <div class="modal-box error">
            <div class="error-icon" aria-hidden="true"></div>
            <p class="modal-label" style="color:var(--red)">提交失败</p>
            <p id="errorMessage" class="modal-message" style="color:var(--ink);margin-bottom:0"></p>
            <button id="closeError" class="btn-close">关闭</button>
        </div>
    </div>

    <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const selectedFile = document.getElementById('selectedFile');
    const fileNameEl = document.getElementById('fileName');
    const fileSizeEl = document.getElementById('fileSize');
    const removeFile = document.getElementById('removeFile');
    const textInput = document.getElementById('textInput');
    const docName = document.getElementById('documentName');
    const startBtn = document.getElementById('startBtn');
    const progressModal = document.getElementById('progressModal');
    const progressMsg = document.getElementById('progressMessage');
    const progressBar = document.getElementById('progressBar');
    const progressPct = document.getElementById('progressPercent');
    const checkpoints = document.getElementById('checkpoints');
    const errorModal = document.getElementById('errorModal');
    const errorMsg = document.getElementById('errorMessage');
    const closeError = document.getElementById('closeError');
    const reviewToggle = document.getElementById('reviewToggle');
    const uploadTitle = document.getElementById('uploadTitle');
    const supportText = document.getElementById('supportText');
    const formatDetail = document.getElementById('formatDetail');
    const historyList = document.getElementById('historyList');
    const toggleHistory = document.getElementById('toggleHistory');
    const sideHistory = document.querySelector('.side-history');
    const nameLabel = document.getElementById('nameLabel');
    const homeBoard = document.getElementById('homeBoard');
    const workbenchPanel = document.getElementById('workbenchPanel');

    let currentFile = null;
    let productType = 'review';
    let reviewType = 'document';
    let historyItems = [];
    const runningFromFile = window.location.protocol === 'file:';
    const localAppUrl = 'http://127.0.0.1:5055/';

    function apiUrl(path) {
        if (runningFromFile) return new URL(path, localAppUrl).toString();
        try { return new URL(path, window.location.href).toString(); } catch (_) { return path; }
    }

    function normalizeUploadFilename(filename) {
        const trimmed = (filename || '').trim() || 'upload.txt';
        const dotIndex = trimmed.lastIndexOf('.');
        const ext = dotIndex >= 0 ? trimmed.slice(dotIndex) : '';
        const stem = dotIndex >= 0 ? trimmed.slice(0, dotIndex) : trimmed;
        const normalizedStem = stem
            .normalize('NFKD')
            .replace(/[^\w.-]+/g, '_')
            .replace(/_+/g, '_')
            .replace(/^_+|_+$/g, '') || 'upload';
        return `${normalizedStem}${ext}`;
    }

    function buildUploadFile(file) {
        const safeName = normalizeUploadFilename(file?.name || 'upload.txt');
        try {
            return new File([file], safeName, {
                type: file.type || 'application/octet-stream',
                lastModified: file.lastModified || Date.now(),
            });
        } catch (_) {
            return file;
        }
    }

    function setModeCopy(nextType) {
        const nextTitle = productType === 'desensitize'
            ? '上传数据开始脱敏'
            : nextType === 'code' ? '上传代码开始审查' : '上传文件开始审查';
        const nextSupport = productType === 'desensitize'
            ? '支持 30+ 常见格式，覆盖文档、表格、结构化数据、图片与扫描件'
            : nextType === 'code'
            ? '支持 JS、TS、Python、Java、Go、SQL 等代码文件'
            : '支持 PDF、Word、TXT、扫描 PDF、图片';
        const nextPlaceholder = productType === 'desensitize'
            ? '直接粘贴待脱敏数据，系统会将手机号、邮箱、身份证、银行卡、地址、密钥等替换为类型标签...'
            : nextType === 'code'
            ? '直接粘贴代码，系统会扫描个人信息处理、密钥、日志、传输和本地存储风险...'
            : '直接粘贴隐私政策或数据处理协议全文...';
        const detailHtml = productType === 'desensitize'
            ? '<span class="format-group">例如 Office/PDF/PPT、CSV/Excel/JSON、网页/配置文件，以及 PNG/JPG/TIFF 等图片。</span>'
            : '';

        uploadTitle.textContent = nextTitle;
        supportText.textContent = nextSupport;
        textInput.placeholder = nextPlaceholder;
        formatDetail.classList.toggle('show', Boolean(detailHtml));
        formatDetail.innerHTML = detailHtml;
    }

    function setWorkspace(workspace) {
        document.querySelectorAll('[data-workspace]').forEach(item => {
            item.classList.toggle('active', item.dataset.workspace === workspace);
        });
        const showingHome = workspace === 'home';
        document.body.classList.toggle('home-mode', showingHome);
        homeBoard.classList.toggle('show', showingHome);
        workbenchPanel.style.display = showingHome ? 'none' : 'block';
        if (showingHome) return;
        setProductType(workspace === 'desensitize' ? 'desensitize' : 'review');
    }

    function setProductType(nextProductType) {
        productType = nextProductType;
        reviewToggle.style.display = productType === 'review' ? 'grid' : 'none';
        nameLabel.textContent = productType === 'desensitize' ? '任务名称' : '文档名称';
        docName.placeholder = productType === 'desensitize' ? '例：用户调研数据脱敏' : '例：某 App 隐私政策 V2.1';
        startBtn.textContent = productType === 'desensitize' ? '开始脱敏' : '开始审查';
        currentFile = null;
        fileInput.value = '';
        selectedFile.style.display = 'none';
        dropZone.style.display = 'grid';
        setModeCopy(reviewType);
    }

    document.querySelectorAll('[data-workspace]').forEach(btn => {
        btn.addEventListener('click', () => setWorkspace(btn.dataset.workspace || 'review'));
    });

    document.querySelectorAll('[data-home-action]').forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.dataset.homeAction;
            setWorkspace(action === 'desensitize' ? 'desensitize' : 'review');
        });
    });

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const nextType = btn.dataset.reviewType || 'document';
            if (nextType === reviewType) return;
            document.querySelectorAll('.mode-btn').forEach(item => {
                item.classList.remove('active');
                item.setAttribute('aria-selected', 'false');
            });
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
            reviewType = nextType;
            currentFile = null;
            fileInput.value = '';
            selectedFile.style.display = 'none';
            dropZone.style.display = 'grid';
            setModeCopy(reviewType);
        });
        btn.addEventListener('keydown', event => {
            if (!['ArrowLeft', 'ArrowRight'].includes(event.key)) return;
            event.preventDefault();
            const buttons = Array.from(document.querySelectorAll('.mode-btn'));
            const index = buttons.indexOf(btn);
            const nextIndex = event.key === 'ArrowRight'
                ? (index + 1) % buttons.length
                : (index - 1 + buttons.length) % buttons.length;
            buttons[nextIndex].focus();
            buttons[nextIndex].click();
        });
    });

    selectFileBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.click();
    });
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('drag-active');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-active');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        currentFile = file;
        fileNameEl.textContent = file.name;
        fileSizeEl.textContent = fmtSize(file.size);
        selectedFile.style.display = 'block';
        dropZone.style.display = 'none';
        textInput.value = '';
        if (!docName.value.trim()) docName.value = file.name.replace(/\.[^/.]+$/, '');
    }

    removeFile.addEventListener('click', () => {
        currentFile = null;
        fileInput.value = '';
        selectedFile.style.display = 'none';
        dropZone.style.display = 'grid';
    });

    textInput.addEventListener('input', () => {
        if (textInput.value.trim()) {
            currentFile = null;
            selectedFile.style.display = 'none';
            dropZone.style.display = 'grid';
        }
    });

    function fmtSize(b) {
        if (b < 1024) return b + ' B';
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
        return (b / 1048576).toFixed(1) + ' MB';
    }

    startBtn.addEventListener('click', async () => {
        const name = docName.value.trim();
        if (!name) return showErr(productType === 'desensitize' ? '请输入任务名称' : '请输入文档名称');
        const text = textInput.value.trim();
        if (!currentFile && !text) return showErr('请上传文件或输入文本');

        const fd = new FormData();
        fd.append('document_name', name);
        if (productType === 'review') fd.append('review_type', reviewType);
        if (currentFile) {
            const uploadFile = buildUploadFile(currentFile);
            fd.append('file', uploadFile, normalizeUploadFilename(currentFile.name));
        } else {
            fd.append('input_text', text);
        }

        progressModal.classList.add('show');
        setProgress(0, '准备开始...');
        checkpoints.innerHTML = '<div class="checkpoint-entry"><span class="checkpoint-dot"></span><span>提交任务...</span></div>';

        try {
            const endpoint = productType === 'desensitize' ? '/api/desensitize' : '/api/upload';
            const res = await fetch(apiUrl(endpoint), { method: 'POST', body: fd });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '提交失败');
            streamProgress(data.task_id);
        } catch (e) {
            progressModal.classList.remove('show');
            showErr(e?.message ? String(e.message) : String(e));
        }
    });

    function streamProgress(taskId) {
        let finished = false;
        let animId = null;
        const startTime = performance.now();
        // 指数曲线：开始快 → 逐渐变慢 → 最后卡在 95% 等完成
        // 公式: pct = 95 * (1 - e^(-t/20000))
        // 5s≈12%  10s≈23%  20s≈41%  30s≈55%  60s≈81%  90s≈91%  120s≈94%
        const TAU = 22000; // 时间常数，越小越快

        function smoothProgress() {
            if (finished) return;
            const elapsed = performance.now() - startTime;
            const pct = 95 * (1 - Math.exp(-elapsed / TAU));
            setProgress(Math.round(Math.min(pct, 95)), progressMsg.textContent);
            animId = requestAnimationFrame(smoothProgress);
        }

        const es = new EventSource(apiUrl(`/api/progress/${encodeURIComponent(taskId)}`));
        es.onmessage = evt => {
            if (finished) return;
            const data = JSON.parse(evt.data);
            if (data.error) {
                finished = true;
                if (animId) cancelAnimationFrame(animId);
                es.close();
                progressModal.classList.remove('show');
                showErr(data.error);
                return;
            }
            const p = data.progress || {};
            // 更新消息文本和检查点（每步都记录），不改变进度百分比
            const msg = p.message || data.message || '';
            if (msg) {
                setProgress(Math.round(Math.min(currentProgressPct(), 95)), msg);
                addCheckpoint(msg);
            }

            if (data.status === 'completed') {
                finished = true;
                if (animId) cancelAnimationFrame(animId);
                es.close();
                const resultPath = productType === 'desensitize'
                    ? `/desensitize/result/${encodeURIComponent(taskId)}`
                    : `/result/${encodeURIComponent(taskId)}`;
                setProgress(100, productType === 'desensitize' ? '脱敏完成，正在打开结果...' : '审查完成，正在打开结果...');
                setTimeout(() => window.location.href = apiUrl(resultPath), 500);
            }
            if (data.status === 'failed') {
                finished = true;
                if (animId) cancelAnimationFrame(animId);
                es.close();
                progressModal.classList.remove('show');
                showErr(p.message || (productType === 'desensitize' ? '脱敏失败' : '审查失败'));
            }
        };
        es.onerror = () => { if (!finished) es.close(); };

        function currentProgressPct() {
            const elapsed = performance.now() - startTime;
            return Math.min(95 * (1 - Math.exp(-elapsed / TAU)), 95);
        }

        // 启动平滑动画
        animId = requestAnimationFrame(smoothProgress);
    }

    function renderHistory(items) {
        historyList.innerHTML = items.length ? items.map(item => `
            <div class="history-item-wrap" data-task-id="${escapeHtml(item.id)}">
                <a class="history-item" href="${item.product_type === 'desensitize' ? '/desensitize/result/' : '/result/'}${encodeURIComponent(item.id)}">
                    <div>
                        <p class="history-name">${escapeHtml(item.document_name || '未命名任务')}</p>
                        <p class="history-meta">${item.product_type === 'desensitize' ? '脱敏处理' : (item.review_type === 'code' ? '代码审查' : '文档审查')} · ${escapeHtml(formatTime(item.created_at))}</p>
                    </div>
                    <span class="history-status">${escapeHtml(item.status || '')}</span>
                </a>
                <div class="history-actions" aria-label="任务操作">
                    <button class="history-action danger" type="button" data-history-action="delete" title="删除本地任务">删</button>
                </div>
            </div>
        `).join('') : '<p class="history-empty">暂无审查记录</p>';
    }

    function filterHistory(query) {
        const q = query.trim().toLowerCase();
        if (!q) { renderHistory(historyItems); return; }
        renderHistory(historyItems.filter(item =>
            (item.document_name || '').toLowerCase().includes(q) ||
            (item.product_type || '').toLowerCase().includes(q) ||
            (item.review_type || '').toLowerCase().includes(q) ||
            (item.status || '').toLowerCase().includes(q)
        ));
    }

    async function loadHistory() {
        if (runningFromFile) {
            historyList.innerHTML = `<p class="history-empty">当前是静态模板预览，记录和处理接口需要从 <a href="${localAppUrl}" style="color:var(--teal);font-weight:800">本地服务页面</a> 打开。</p>`;
            return;
        }
        try {
            const res = await fetch(apiUrl('/api/history'), { cache: 'no-store' });
            const data = await res.json();
            const items = data.items || [];
            historyItems = items;
            const searchVal = document.getElementById('historySearch').value;
            filterHistory(searchVal);
        } catch (e) {
            historyList.innerHTML = '<p class="history-empty">记录读取失败</p>';
        }
    }

    async function updateHistoryItem(taskId, action) {
        const endpoint = `/api/history/${encodeURIComponent(taskId)}`;
        const method = 'DELETE';
        const res = await fetch(apiUrl(endpoint), { method });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) throw new Error(data.error || '操作失败');
        await loadHistory();
    }

    function formatTime(value) {
        return value ? String(value).slice(0, 19).replace('T', ' ') : '';
    }

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[ch]));
    }

    function setProgress(pct, msg) {
        progressBar.style.width = pct + '%';
        progressPct.textContent = pct + '%';
        progressMsg.textContent = msg;
    }

    function addCheckpoint(msg) {
        const last = checkpoints.lastElementChild;
        if (last && last.textContent.trim() === msg.trim()) return;
        // 前一条标记为已完成
        if (last) last.querySelector('.checkpoint-dot')?.classList.add('done');
        const el = document.createElement('div');
        el.className = 'checkpoint-entry';
        el.innerHTML = `<span class="checkpoint-dot"></span><span>${escapeHtml(msg)}</span>`;
        checkpoints.appendChild(el);
        checkpoints.scrollTop = checkpoints.scrollHeight;
    }

    function showErr(msg) {
        errorMsg.textContent = msg;
        errorModal.classList.add('show');
    }

    toggleHistory.addEventListener('click', () => {
        const collapsed = sideHistory.classList.toggle('collapsed');
        toggleHistory.textContent = collapsed ? '显示' : '隐藏';
    });
    historyList.addEventListener('click', async event => {
        const btn = event.target.closest('[data-history-action]');
        if (!btn) return;
        event.preventDefault();
        event.stopPropagation();
        const wrap = btn.closest('[data-task-id]');
        const taskId = wrap?.dataset.taskId;
        if (!taskId) return;
        const action = btn.dataset.historyAction;
        if (action === 'delete' && !window.confirm('删除后会移除这个任务的本地输出文件，确定删除吗？')) return;
        try {
            await updateHistoryItem(taskId, action);
        } catch (error) {
            showErr(error?.message || '操作失败');
        }
    });
    closeError.addEventListener('click', () => errorModal.classList.remove('show'));

    // History search
    const historySearch = document.getElementById('historySearch');
    let searchTimer = null;
    historySearch.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => filterHistory(historySearch.value), 150);
    });
    historySearch.addEventListener('keydown', e => {
        if (e.key === 'Escape') { historySearch.value = ''; filterHistory(''); historySearch.blur(); }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const initialWorkspace = urlParams.get('workspace') || 'home';
    document.body.classList.add('home-mode');
    setWorkspace(initialWorkspace);
    loadHistory();

    // Theme toggle
    function applyTheme(dark) {
        document.body.classList.toggle('dark', dark);
        localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') applyTheme(true);
    else if (savedTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme(true);
    document.querySelectorAll('.theme-toggle, .theme-float, #themeToggle, #themeFloat').forEach(btn => {
        btn.addEventListener('click', () => {
            applyTheme(!document.body.classList.contains('dark'));
        });
    });
    </script>
</body>
</html>
