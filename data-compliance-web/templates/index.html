<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据合规智能审查系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --bg-subtle: #f8fafc;
            --bg-elevated: #ffffff;
            --accent: #4f46e5;
            --accent-light: #e0e7ff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 20px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-subtle);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-primary);
        }
        .logo span { color: var(--accent); }
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }
        .hero-content h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(36px, 4vw, 52px);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
        }
        .hero-content p {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 40px;
        }
        .upload-card {
            background: var(--bg-elevated);
            border-radius: 24px;
            padding: 48px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            background: var(--bg-subtle);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.drag-active {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .upload-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: var(--bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: var(--shadow);
        }
        .upload-zone h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .upload-zone p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .features-bar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 80px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 24px;
            background: var(--bg);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .feature-icon {
            width: 44px;
            height: 44px;
            background: var(--accent-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .feature-text h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .feature-text p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        /* File card */
        .file-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px;
            background: var(--bg-subtle);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .file-card-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .file-icon {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .file-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .file-size { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .file-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
            display: flex;
            align-items: center;
            transition: color 0.15s;
            font-size: 18px;
        }
        .file-remove:hover { color: #ef4444; }
        /* Text input */
        .text-input-area {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-subtle);
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s;
        }
        .text-input-area:focus {
            border-color: var(--accent);
        }
        .text-input-area::placeholder { color: var(--text-muted); }
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        /* Modal */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
            backdrop-filter: blur(4px);
        }
        .modal-backdrop.show { display: flex; }
        .modal-box {
            background: var(--bg);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            box-shadow: var(--shadow-lg);
        }
        .modal-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .modal-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .modal-message {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            min-height: 20px;
        }
        .progress-track {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .checkpoint-list {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
            max-height: 160px;
            overflow-y: auto;
        }
        .checkpoint-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 6px 0;
        }
        .checkpoint-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }
        .checkpoint-dot.done { background: var(--accent); }
        /* Error modal */
        .modal-box.error { border-top: 4px solid #ef4444; }
        .error-icon {
            width: 48px;
            height: 48px;
            background: #fef2f2;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            margin-bottom: 16px;
            font-size: 24px;
        }
        .btn-close {
            margin-top: 24px;
            display: block;
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .btn-close:hover { 
            background: var(--text-primary); 
            color: #fff; 
            border-color: var(--text-primary); 
        }
        /* Field label */
        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .field-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-subtle);
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        .field-input:focus {
            border-color: var(--accent);
        }
        .field-input::placeholder { color: var(--text-muted); }
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; gap: 48px; }
            .features-bar { grid-template-columns: 1fr; }
            .header-inner { padding: 0 24px; }
            .main { padding: 48px 24px; }
            .features-bar { padding: 0 24px 48px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">Compliance<span>AI</span></div>
        </div>
    </header>
    <main class="main">
        <div class="hero-content">
            <h1>让合规审查<br>像呼吸一样自然</h1>
            <p>AI 驱动的智能审查系统，自动识别法律文件中的合规风险，为您的业务保驾护航。</p>
        </div>
        <div class="upload-card">
            <label class="field-label">文档名称</label>
            <input type="text" id="documentName" class="field-input" placeholder="例：某 App 隐私政策 V2.1">
            
            <div id="dropZone" class="upload-zone">
                <div class="upload-icon">📁</div>
                <h3>上传文件开始审查</h3>
                <p>支持 PDF、Word、TXT 格式</p>
                <button class="btn-primary" id="selectFileBtn">选择文件</button>
                <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.doc,.docx,.pdf">
            </div>
            
            <div id="selectedFile" style="display:none">
                <div class="file-card">
                    <div class="file-card-left">
                        <div class="file-icon">📄</div>
                        <div>
                            <p id="fileName" class="file-name"></p>
                            <p id="fileSize" class="file-size"></p>
                        </div>
                    </div>
                    <button id="removeFile" class="file-remove">✕</button>
                </div>
            </div>
            
            <div class="or-divider">或</div>
            
            <textarea id="textInput" class="text-input-area" rows="4" placeholder="直接粘贴隐私政策或数据处理协议全文..."></textarea>
            
            <button id="startBtn" class="btn-primary" style="width: 100%; margin-top: 16px;">
                开始审查
            </button>
        </div>
    </main>
    <section class="features-bar">
        <div class="feature-item">
            <div class="feature-icon">⚡</div>
            <div class="feature-text">
                <h4>秒级响应</h4>
                <p>大模型驱动，瞬间完成分析</p>
            </div>
        </div>
        <div class="feature-item">
            <div class="feature-icon">🎯</div>
            <div class="feature-text">
                <h4>精准定位</h4>
                <p>智能标注风险条款位置</p>
            </div>
        </div>
        <div class="feature-item">
            <div class="feature-icon">📋</div>
            <div class="feature-text">
                <h4>专业报告</h4>
                <p>导出标准化审查文档</p>
            </div>
        </div>
    </section>

    <!-- Progress Modal -->
    <div id="progressModal" class="modal-backdrop">
        <div class="modal-box">
            <p class="modal-label">正在处理</p>
            <h3 class="modal-title">审查进行中…</h3>
            <p id="progressMessage" class="modal-message">准备开始</p>
            <div class="progress-track">
                <div id="progressBar" class="progress-fill" style="width:0%"></div>
            </div>
            <div class="progress-meta">
                <span>进度</span>
                <span id="progressPercent">0%</span>
            </div>
            <div id="checkpoints" class="checkpoint-list"></div>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal-backdrop">
        <div class="modal-box error">
            <div class="error-icon">⚠️</div>
            <p class="modal-label" style="color:#ef4444">提交失败</p>
            <p id="errorMessage" class="modal-message" style="color:var(--text-primary);margin-bottom:0"></p>
            <button id="closeError" class="btn-close">关闭</button>
        </div>
    </div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const selectFileBtn = document.getElementById('selectFileBtn');
const selectedFile = document.getElementById('selectedFile');
const fileNameEl = document.getElementById('fileName');
const fileSizeEl = document.getElementById('fileSize');
const removeFile = document.getElementById('removeFile');
const textInput = document.getElementById('textInput');
const docName = document.getElementById('documentName');
const startBtn = document.getElementById('startBtn');
const progressModal = document.getElementById('progressModal');
const progressMsg = document.getElementById('progressMessage');
const progressBar = document.getElementById('progressBar');
const progressPct = document.getElementById('progressPercent');
const checkpoints = document.getElementById('checkpoints');
const errorModal = document.getElementById('errorModal');
const errorMsg = document.getElementById('errorMessage');
const closeError = document.getElementById('closeError');

let currentFile = null;

function apiUrl(path) {
    try {
        return new URL(path, window.location.href).toString();
    } catch (_) {
        return path;
    }
}

function normalizeUploadFilename(filename) {
    const trimmed = (filename || '').trim() || 'upload.txt';
    const dotIndex = trimmed.lastIndexOf('.');
    const ext = dotIndex >= 0 ? trimmed.slice(dotIndex) : '';
    const stem = dotIndex >= 0 ? trimmed.slice(0, dotIndex) : trimmed;
    const normalizedStem = stem
        .normalize('NFKD')
        .replace(/[^\w.-]+/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_+|_+$/g, '') || 'upload';
    return `${normalizedStem}${ext}`;
}

function buildUploadFile(file) {
    const safeName = normalizeUploadFilename(file?.name || 'upload.txt');
    try {
        return new File([file], safeName, {
            type: file.type || 'application/octet-stream',
            lastModified: file.lastModified || Date.now(),
        });
    } catch (_) {
        return file;
    }
}

selectFileBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    fileInput.click();
});
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { 
    e.preventDefault(); 
    dropZone.classList.add('drag-active'); 
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
dropZone.addEventListener('drop', e => {
    e.preventDefault(); 
    dropZone.classList.remove('drag-active');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { 
    if (e.target.files.length) handleFile(e.target.files[0]); 
});

function handleFile(file) {
    currentFile = file;
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = fmtSize(file.size);
    selectedFile.style.display = 'block';
    dropZone.style.display = 'none';
    textInput.value = '';
    if (!docName.value.trim()) {
        const baseName = file.name.replace(/\.[^/.]+$/, '');
        docName.value = baseName;
    }
}
removeFile.addEventListener('click', () => {
    currentFile = null;
    fileInput.value = '';
    selectedFile.style.display = 'none';
    dropZone.style.display = 'block';
});
textInput.addEventListener('input', () => {
    if (textInput.value.trim()) { 
        currentFile = null; 
        selectedFile.style.display = 'none';
        dropZone.style.display = 'block';
    }
});

function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
}

startBtn.addEventListener('click', async () => {
    const name = docName.value.trim();
    if (!name) { showErr('请输入文档名称'); return; }
    const text = textInput.value.trim();
    if (!currentFile && !text) { showErr('请上传文件或输入文本'); return; }

    const fd = new FormData();
    fd.append('document_name', name);
    if (currentFile) {
        const uploadFile = buildUploadFile(currentFile);
        fd.append('file', uploadFile, normalizeUploadFilename(currentFile.name));
    }
    else fd.append('input_text', text);

    progressModal.classList.add('show');
    setProgress(0, '准备开始…');

    try {
        const res = await fetch(apiUrl('/api/upload'), { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '上传失败');
        streamProgress(data.task_id);
    } catch(e) {
        progressModal.classList.remove('show');
        const msg = e?.message ? String(e.message) : String(e);
        console.error('upload failed', {
            message: msg,
            href: window.location.href,
            origin: window.location.origin,
            fileName: currentFile?.name || null,
        });
        showErr(msg);
    }
});

function streamProgress(taskId) {
    const es = new EventSource(apiUrl(`/api/progress/${encodeURIComponent(taskId)}`));
    es.onmessage = evt => {
        const d = JSON.parse(evt.data);
        if (d.error) { 
            es.close(); 
            progressModal.classList.remove('show'); 
            showErr(d.error); 
            return; 
        }
        const p = d.progress || {};
        const pct = Math.round(((p.step||0)/(p.total_steps||11))*100);
        setProgress(pct, p.message || '处理中…');
        if (p.message) addCheckpoint(p.message);
        if (d.status === 'completed') {
            es.close();
            setProgress(100, '审查完成，正在跳转…');
            setTimeout(() => window.location.href = apiUrl(`/result/${encodeURIComponent(taskId)}`), 500);
        } else if (d.status === 'failed') {
            es.close(); 
            progressModal.classList.remove('show');
            showErr(p.message || '审查失败');
        }
    };
    es.onerror = () => es.close();
}

function setProgress(pct, msg) {
    progressBar.style.width = pct + '%';
    progressPct.textContent = pct + '%';
    progressMsg.textContent = msg;
}
function addCheckpoint(msg) {
    const last = checkpoints.lastElementChild;
    if (last && last.textContent.trim() === msg.trim()) return;
    const el = document.createElement('div');
    el.className = 'checkpoint-entry';
    el.innerHTML = `<span class="checkpoint-dot done"></span><span>${msg}</span>`;
    checkpoints.appendChild(el);
    checkpoints.scrollTop = checkpoints.scrollHeight;
}
function showErr(msg) {
    errorMsg.textContent = msg;
    errorModal.classList.add('show');
}
closeError.addEventListener('click', () => errorModal.classList.remove('show'));
</script>
</body>
</html>
